# Databricks Asset Bundle Configuration
# This is the main configuration file for the DAB project
# Environment-specific overrides are in the config/ directory

bundle:
  name: databricks-dab-project

# Include environment-specific configurations
include:
  - resources/*.yml
  - config/*.yml

# Workspace configuration
# Note: Host is configured via authentication profile in GitHub Actions
# Notebooks will be stored in /Workspace/databricks-dab-project/{env}/
workspace:
  root_path: /Workspace/${bundle.name}/${bundle.target}

# Artifacts configuration - files to be uploaded to Databricks
artifacts:
  notebooks:
    type: notebook
    path: ./src/notebooks

  files:
    type: file
    path: ./src/files

# Variables that can be overridden per environment
# Note: Workspace host is configured via DATABRICKS_HOST environment variable
variables:
  # Environment name
  environment:
    description: "Environment name (dev/uat/prod)"

  # Service Principal Client ID
  service_principal_client_id:
    description: "Service Principal Client ID for deployment"

  # Catalog name for Unity Catalog
  catalog_name:
    description: "Unity Catalog name"
    default: "main"

  # Schema/Database name
  schema_name:
    description: "Schema/Database name"
    default: "default"

  # Resource prefix for naming
  resource_prefix:
    description: "Prefix for resource names"
    default: ""

  # Compute configurations
  cluster_node_type:
    description: "Node type for cluster instances"
    default: "i3.xlarge"

  cluster_autoscale_min:
    description: "Minimum number of workers for autoscaling"
    default: 1

  cluster_autoscale_max:
    description: "Maximum number of workers for autoscaling"
    default: 3

  # Storage paths
  checkpoint_location:
    description: "S3 path for DLT checkpoints"
    default: "s3://your-bucket/checkpoints"

  data_location:
    description: "S3 path for data storage"
    default: "s3://your-bucket/data"

  # Additional cluster settings
  enable_autoscaling:
    description: "Enable cluster autoscaling"
    default: true

  enable_spot_instances:
    description: "Enable spot instances for cost savings"
    default: false

  # SQL Warehouse configuration
  sql_warehouse_id:
    description: "SQL Warehouse ID for SQL tasks (get from Databricks workspace)"
    default: "your-sql-warehouse-id"

# Targets for different environments
targets:
  # Development environment
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/${bundle.name}/${bundle.target}
    variables:
      environment: "dev"
      catalog_name: "dev_catalog"
      schema_name: "dev_schema"
      resource_prefix: "dev_"
    run_as:
      service_principal_name: ${var.service_principal_client_id}

  # UAT environment
  uat:
    mode: development
    workspace:
      root_path: /Workspace/${bundle.name}/${bundle.target}
    variables:
      environment: "uat"
      catalog_name: "uat_catalog"
      schema_name: "uat_schema"
      resource_prefix: "uat_"
    run_as:
      service_principal_name: ${var.service_principal_client_id}

  # Production environment
  prod:
    mode: production
    workspace:
      root_path: /Workspace/${bundle.name}/${bundle.target}
    variables:
      environment: "prod"
      catalog_name: "prod_catalog"
      schema_name: "prod_schema"
      resource_prefix: "prod_"
    run_as:
      service_principal_name: ${var.service_principal_client_id}
    # Production has stricter controls
    permissions:
      - level: CAN_VIEW
        group_name: "data-analysts"
      - level: CAN_RUN
        group_name: "data-engineers"
