name: Deploy Databricks Asset Bundle

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod

jobs:
  # Validate configuration
  validate:
    name: Validate DAB Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks Authentication
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg <<EOL
          [DEV]
          host = ${{ secrets.DATABRICKS_DEV_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}

          [UAT]
          host = ${{ secrets.DATABRICKS_UAT_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}

          [PROD]
          host = ${{ secrets.DATABRICKS_PROD_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOL
          chmod 600 ~/.databrickscfg
          echo "✅ Databricks authentication profiles configured"
          databricks auth profiles

      - name: Validate Dev Configuration
        env:
          BUNDLE_VAR_service_principal_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          echo "Validating dev environment..."
          echo "📋 Configuration Summary:"
          databricks bundle validate -t dev -p DEV || {
            echo "❌ Validation failed!"
            echo "Checking for common issues..."
            echo "Variables defined in databricks.yml:"
            grep -A 1 "^  [a-z_]*:" databricks.yml | head -20 || true
            exit 1
          }

      - name: Validate UAT Configuration
        env:
          BUNDLE_VAR_service_principal_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          echo "Validating uat environment..."
          echo "📋 Configuration Summary:"
          databricks bundle validate -t uat -p UAT || {
            echo "❌ Validation failed!"
            exit 1
          }

      - name: Validate Prod Configuration
        env:
          BUNDLE_VAR_service_principal_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          echo "Validating prod environment..."
          echo "📋 Configuration Summary:"
          databricks bundle validate -t prod -p PROD || {
            echo "❌ Validation failed!"
            exit 1
          }

  # Deploy to Dev (automatic on develop branch)
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks Authentication
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg <<EOL
          [DEV]
          host = ${{ secrets.DATABRICKS_DEV_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOL
          chmod 600 ~/.databrickscfg
          echo "✅ Databricks authentication configured for DEV"

      - name: Deploy to Dev
        env:
          BUNDLE_VAR_service_principal_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          echo "Deploying to Dev environment..."
          databricks bundle deploy -t dev -p DEV
          echo "✅ Deployment to Dev completed successfully"

      - name: Post Deployment Info
        run: |
          echo "### 🚀 Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace**: ${{ secrets.DATABRICKS_DEV_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # Deploy to UAT (automatic on main branch)
  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: uat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks Authentication
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg <<EOL
          [UAT]
          host = ${{ secrets.DATABRICKS_UAT_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOL
          chmod 600 ~/.databrickscfg
          echo "✅ Databricks authentication configured for UAT"

      - name: Deploy to UAT
        env:
          BUNDLE_VAR_service_principal_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          echo "Deploying to UAT environment..."
          databricks bundle deploy -t uat -p UAT
          echo "✅ Deployment to UAT completed successfully"

      - name: Post Deployment Info
        run: |
          echo "### 🚀 UAT Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: UAT" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace**: ${{ secrets.DATABRICKS_UAT_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # Deploy to Production (manual approval required)
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[deploy-prod]'))
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Configure Databricks Authentication
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg <<EOL
          [PROD]
          host = ${{ secrets.DATABRICKS_PROD_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          EOL
          chmod 600 ~/.databrickscfg
          echo "✅ Databricks authentication configured for PROD"

      - name: Deploy to Production
        env:
          BUNDLE_VAR_service_principal_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          echo "🚨 Deploying to PRODUCTION environment..."
          databricks bundle deploy -t prod -p PROD
          echo "✅ Deployment to Production completed successfully"

      - name: Post Deployment Info
        run: |
          echo "### 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace**: ${{ secrets.DATABRICKS_PROD_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Create Deployment Tag
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG_NAME="prod-$(date +'%Y%m%d-%H%M%S')"
          git tag -a "$TAG_NAME" -m "Production deployment on $(date)"
          git push origin "$TAG_NAME"
